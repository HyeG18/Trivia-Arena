syntax = "proto3";
package arena.user;

service UserService {
  // Llamada síncrona (Unary) para el Onboarding 
  rpc JoinArena (JoinRequest) returns (JoinResponse);
}

message JoinRequest {
  string username = 1;
}

message JoinResponse {
  bool success = 1;
  string user_id = 2;
  string message = 3;
}